<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Golfdag">
  <meta name="theme-color" content="#1B5E20">
  <title>Pelle's golfapps</title>
  <style>
    :root {
      --bg: #F4EFE3;
      --text: #1A1A1A;
      --muted: #6B7280;
      --haenen: #1B5E20;
      --haenen-dark: #103D14;
      --toxandria: #0E3A5C;
      --toxandria-dark: #082640;
    }
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      max-width: 480px;
      margin: 0 auto;
      padding: 24px 18px 40px;
      min-height: 100vh;
      -webkit-tap-highlight-color: transparent;
    }
    .hero {
      text-align: center;
      padding: 20px 12px 28px;
    }
    .hero-title {
      font-size: 1.6rem;
      font-weight: 800;
      letter-spacing: 0.3px;
      color: #2E2E2E;
    }
    .hero-sub {
      font-size: 0.95rem;
      color: var(--muted);
      margin-top: 6px;
    }
    .choice {
      display: block;
      border-radius: 18px;
      padding: 28px 22px;
      margin-bottom: 18px;
      color: #fff;
      text-decoration: none;
      box-shadow: 0 6px 18px rgba(0,0,0,0.15);
      transition: transform 0.12s, box-shadow 0.12s;
      position: relative;
      overflow: hidden;
    }
    .choice:active {
      transform: scale(0.98);
      box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    }
    .choice-haenen {
      background: linear-gradient(135deg, var(--haenen) 0%, var(--haenen-dark) 100%);
    }
    .choice-toxandria {
      background: linear-gradient(135deg, #1B5687 0%, var(--toxandria-dark) 100%);
    }
    .choice-title {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 0.4px;
    }
    .choice-sub {
      font-size: 0.85rem;
      opacity: 0.9;
      margin-top: 6px;
    }
    .choice-meta {
      font-size: 0.75rem;
      opacity: 0.75;
      margin-top: 12px;
      letter-spacing: 0.3px;
    }
    .choice-arrow {
      position: absolute;
      right: 22px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1.6rem;
      opacity: 0.6;
    }
    .footer {
      text-align: center;
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 32px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <div class="hero">
    <div class="hero-title">Pelle&rsquo;s golfapps &#x26F3;</div>
    <div class="hero-sub">Kies een golfdag</div>
  </div>

  <a class="choice choice-haenen" href="haenen/">
    <div class="choice-title">De Haenen</div>
    <div class="choice-sub">Scorekaart met GPS &middot; 18 holes</div>
    <div class="choice-meta">Woensdag 18 juni 2025 &middot; Rijsbergen</div>
    <span class="choice-arrow">&rsaquo;</span>
  </a>

  <div class="footer">
    Voeg toe aan beginscherm voor app-ervaring.<br>
    Made with &#x2665; door Pelle
  </div>

</body>
</html>
